<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
    <meta charset="UTF-8">
</head>
<body>

<h2>Add New Book</h2>

<form th:action="@{/books/add}" th:object="${book}" method="post">

    <div>
        <label for="id">ID:</label>
        <input type="number" id="id" th:field="*{id}" />
        <div th:if="${#fields.hasErrors('id')}" th:errors="*{id}" style="color:red"></div>
    </div>
    <br>

    <div>
        <label for="title">Title:</label>
        <input type="text" id="title" th:field="*{title}" />
        <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red"></div>
    </div>
    <br>

    <div>
        <label for="author">Author:</label>
        <input type="text" id="author" th:field="*{author}" />
        <div th:if="${#fields.hasErrors('author')}" th:errors="*{author}" style="color:red"></div>
    </div>
    <br>

    <div>
        <label for="price">Price:</label>
        <input type="number" step="0.01" id="price" th:field="*{price}" />
        <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" style="color:red"></div>
    </div>
    <br>

    <button type="submit">Add Book</button>
</form>

<br>
<a th:href="@{/books}">Back to Book List</a>

</body>
</html>
