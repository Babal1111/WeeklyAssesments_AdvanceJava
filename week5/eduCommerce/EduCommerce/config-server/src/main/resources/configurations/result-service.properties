server.port=8083
spring.application.name=result-service

spring.datasource.url=jdbc:h2:mem:resultdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:sa}

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=${JWT_SECRET:educommerce-secret-key-for-jwt-token-generation-2024}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

resilience4j.circuitbreaker.instances.attendance-cb.register-health-indicator=true
resilience4j.circuitbreaker.instances.attendance-cb.sliding-window-size=10
resilience4j.circuitbreaker.instances.attendance-cb.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.attendance-cb.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.attendance-cb.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.attendance-cb.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.attendance-cb.event-consumer-buffer-size=10

management.endpoints.web.exposure.include=*
management.health.circuitbreakers.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
