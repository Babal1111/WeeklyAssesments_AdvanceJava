spring.application.name=api-gateway
server.port=8080

# Config Server
spring.config.import=optional:configserver:http://localhost:8888

# Fallback properties (used if config server not available)
jwt.secret=${JWT_SECRET:educommerce-secret-key-for-jwt-token-generation-2024}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Gateway Routes
spring.cloud.gateway.routes[0].id=student-service-auth
spring.cloud.gateway.routes[0].uri=lb://student-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=name=JwtAuthFilter

spring.cloud.gateway.routes[1].id=student-service
spring.cloud.gateway.routes[1].uri=lb://student-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/students/**,/courses/**,/enroll/**
spring.cloud.gateway.routes[1].filters[0]=name=JwtAuthFilter

spring.cloud.gateway.routes[2].id=attendance-service
spring.cloud.gateway.routes[2].uri=lb://attendance-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/attendance/**
spring.cloud.gateway.routes[2].filters[0]=name=JwtAuthFilter

spring.cloud.gateway.routes[3].id=result-service
spring.cloud.gateway.routes[3].uri=lb://result-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/results/**
spring.cloud.gateway.routes[3].filters[0]=name=JwtAuthFilter

management.endpoints.web.exposure.include=*
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
